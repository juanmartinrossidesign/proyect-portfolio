<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap -->

        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">

  <!-- Your CSS -->
  <link rel="stylesheet" href="../css/style.css" />

  <title>Contact | Juan Martín Rossi</title>
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-md bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="../index.html">Juan Martín Rossi</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
          aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto gap-1">
            <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="process.html">Process</a></li>
            <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="contact.html">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="contact">
      <h1>Contact</h1>
      <p>I usually reply within 24–48 hours</p>

      <form action="#" method="post">
        <div>
          <label for="name">Name</label>
          <input type="text" name="name" id="name" placeholder="Your name" required>
        </div>

        <div>
          <label for="email">Email</label>
          <input type="email" name="email" id="email" placeholder="youremail@email.com" required>
        </div>

        <div class="reason">
          <p>Reason</p>

          <label class="reason-option">
            <input type="radio" id="reason-project" name="reason" value="project" checked>
            Project
          </label>

          <label class="reason-option">
            <input type="radio" id="reason-audit" name="reason" value="audit">
            Audit
          </label>

          <label class="reason-option">
            <input type="radio" id="reason-other" name="reason" value="other">
            Other
          </label>
        </div>

        <div>
          <label for="message">Message</label>
          <textarea name="message" id="message" rows="6" placeholder="Write your message here" required></textarea>
        </div>

        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer>
    <p>
      <a href="https://www.linkedin.com/in/jmartinrossi/" target="_blank">LinkedIn</a>
      <a href="https://www.behance.net/juanmartinrossi" target="_blank">Behance</a>
      <a href="mailto:juanmartinrossi.design@gmail.com">Email</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
          crossorigin="anonymous"></script>
</body>
</html>
